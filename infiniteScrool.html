<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinite Logo Scroll</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:system-ui, sans-serif;
  background:#f5f5f5;
}

/* SECTION */
.logo-section{
  background:#fff;
  padding:40px 0;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* SLIDER */
.logo-slider{
  width:100%;
  overflow:hidden;
}

/* TRACK */
.logo-track{
  display:flex;
  width:max-content;
  gap:40px;

  animation: scroll 20s linear infinite;
}

/* LOGO */
.logo{
  width:110px;
  height:60px;
  flex-shrink:0;

  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;

  filter:grayscale(100%);
  transition:.3s;
}

.logo:hover img{
  filter:grayscale(0%);
  transform:scale(1.1);
}

/* Pause on hover */
.logo-slider:hover .logo-track{
  animation-play-state:paused;
}

/* MAGIC INFINITE LOOP */
@keyframes scroll{
  from{ transform:translateX(0); }
  to{ transform:translateX(-50%); }
}

/* Responsive */
@media(max-width:768px){
  .logo{ width:80px; height:50px; }
}

@media(max-width:480px){
  .logo{ width:65px; height:45px; }
}
</style>
</head>

<body>

<section class="logo-section">
  <div class="logo-slider">

    <div class="logo-track">

      <!-- Set 1 -->
      <div class="logo"><img src="./image/logo1.png"></div>
      <div class="logo"><img src="./image/logo2.png"></div>
      <div class="logo"><img src="./image/logo3.png"></div>
      <div class="logo"><img src="./image/logo4.png"></div>
      <div class="logo"><img src="./image/logo5.png"></div>
      <div class="logo"><img src="./image/logo6.png"></div>
      <div class="logo"><img src="./image/logo7.png"></div>

      <!-- Same logos duplicated automatically for seamless scroll -->
      <div class="logo"><img src="./image/logo1.png"></div>
      <div class="logo"><img src="./image/logo2.png"></div>
      <div class="logo"><img src="./image/logo3.png"></div>
      <div class="logo"><img src="./image/logo4.png"></div>
      <div class="logo"><img src="./image/logo5.png"></div>
      <div class="logo"><img src="./image/logo6.png"></div>
      <div class="logo"><img src="./image/logo7.png"></div>

    </div>

  </div>
</section>

</body>
</html>
